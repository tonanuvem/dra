services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sisprime-multi-endoscopia-backend
    env_file:
      - .env
    ports:
      - "8802:8501"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/outputs:/app/outputs
    restart: unless-stopped
    networks:
      - endoscopia-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_KEY}
    container_name: sisprime-multi-endoscopia-frontend
    env_file:
      - .env
    ports:
      - "8801:3000"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - endoscopia-network

networks:
  endoscopia-network:
    driver: bridge
